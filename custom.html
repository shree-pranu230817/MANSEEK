<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customizer | ManSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .customizer-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 60px;
            padding-top: 120px;
            min-height: 90vh;
        }

        .preview-pane {
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .hoodie-mockup {
            width: 80%;
            position: relative;
        }

        .custom-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .custom-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            word-break: break-word;
        }

        .custom-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .controls-pane {
            padding: 40px;
            background: white;
            box-shadow: var(--shadow-soft);
            border-radius: 8px;
        }

        .control-group {
            margin-bottom: 30px;
        }

        .control-group label {
            display: block;
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .color-options {
            display: flex;
            gap: 15px;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition-smooth);
        }

        .color-circle.active {
            border-color: var(--accent-color);
            transform: scale(1.2);
        }

        .input-text {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: rgba(255,0,0,0.02);
        }

        @media (max-width: 768px) {
            .customizer-container { grid-template-columns: 1fr; }
            .preview-pane { height: 400px; }
        }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled">
        <nav class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/logo.svg" alt="ManSeek" height="40">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="custom.html" class="active">Custom Design</a></li>
                <li><a href="about.html">Our Story</a></li>
            </ul>
            <div class="nav-icons">
                <button id="cart-btn" class="cart-trigger">
                    <i class="icon-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="customizer-container">
            <div class="preview-pane">
                <div class="hoodie-mockup">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800" alt="Hoodie Mockup" id="mockup-img">
                    <div class="custom-layer">
                        <div id="text-layer" class="custom-text"></div>
                        <img id="image-layer" class="custom-image" style="display:none">
                    </div>
                </div>
            </div>

            <div class="controls-pane">
                <h2 class="playfair" style="margin-bottom: 30px;">Customize Your Spirit</h2>
                
                <div class="control-group">
                    <label>Choose Hoodie Color</label>
                    <div class="color-options">
                        <div class="color-circle active" style="background: #1a1a1a;" data-color="black" data-img="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800"></div>
                        <div class="color-circle" style="background: #f5f5f5;" data-color="white" data-img="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800&sat=-100"></div>
                        <div class="color-circle" style="background: #3d1f1f;" data-color="maroon" data-img="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800&sepia=50"></div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Add Your Text</label>
                    <input type="text" id="custom-text-input" class="input-text" placeholder="Type something bold...">
                </div>

                <div class="control-group">
                    <label>Upload Artwork (Logo/Image)</label>
                    <div class="upload-area" onclick="document.getElementById('file-input').click()">
                        <p>Click to upload JPG/PNG</p>
                        <input type="file" id="file-input" style="display:none" accept="image/*">
                    </div>
                </div>

                <div class="control-group">
                    <label>Size</label>
                    <select class="input-text">
                        <option>S</option>
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                    </select>
                </div>

                <button class="btn btn-primary btn-block" id="add-custom-btn">Add to Bag - ₹3,499</button>
            </div>
        </div>
    </main>

    <div class="cart-drawer-overlay"></div>
    <div class="cart-drawer">
        <!-- Same as index -->
    </div>

    <script src="js/app.js"></script>
    <script>
        const textInput = document.getElementById('custom-text-input');
        const textLayer = document.getElementById('text-layer');
        const fileInput = document.getElementById('file-input');
        const imageLayer = document.getElementById('image-layer');
        const colorCircles = document.querySelectorAll('.color-circle');
        const mockupImg = document.getElementById('mockup-img');

        textInput.addEventListener('input', (e) => {
            textLayer.textContent = e.target.value;
            imageLayer.style.display = 'none';
            textLayer.style.display = 'block';
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    imageLayer.src = f.target.result;
                    imageLayer.style.display = 'block';
                    textLayer.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        colorCircles.forEach(circle => {
            circle.addEventListener('click', () => {
                colorCircles.forEach(c => c.classList.remove('active'));
                circle.classList.add('active');
                // In a real app, we'd swap the base image
                mockupImg.style.filter = circle.dataset.color === 'white' ? 'brightness(1.5)' : 
                                       circle.dataset.color === 'maroon' ? 'sepia(0.5) hue-rotate(-50deg) brightness(0.7)' : 'none';
            });
        });

        document.getElementById('add-custom-btn').addEventListener('click', () => {
            const customData = {
                text: textLayer.textContent,
                color: document.querySelector('.color-circle.active').dataset.color,
                preview: mockupImg.src
            };
            
            // Dummy product object if product ID 4 doesn't exist in inventory
            if (!products.find(p => p.id === 4)) {
                products.push({
                    id: 4,
                    name: "Signature Hoodie",
                    price: 3499,
                    image: mockupImg.src
                });
            }
            
            window.addToCart(4, customData);
            alert('Customized Hoodie added to your bag!');
        });
    </script>
</body>
</html>
