<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful | ManSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #f8fafc;
        }

        .success-container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 60px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 30px;
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleUp {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .order-id-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #f1f5f9;
            border-radius: 30px;
            font-family: monospace;
            font-weight: 700;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .success-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        @media (max-width: 480px) {
            .success-actions { grid-template-columns: 1fr; }
            .success-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <section class="success-section">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <h1 class="playfair" style="font-size: 32px; margin-bottom: 15px;">Order Successful!</h1>
            <p style="color: var(--text-muted); line-height: 1.6;">Thank you for your purchase. We've received your order and our team is already working on printing your spirit.</p>
            
            <div class="order-id-badge" id="display-order-id">MS-1234567890</div>
            
            <p style="font-size: 14px;">A confirmation email has been sent to your registered address.</p>

            <div class="success-actions">
                <a href="account.html" class="btn btn-primary">Track Order</a>
                <a href="shop.html" class="btn btn-outline">Keep Shopping</a>
            </div>
        </div>
    </section>

    <script>
        const orders = JSON.parse(localStorage.getItem('manseek_orders')) || [];
        if (orders.length > 0) {
            document.getElementById('display-order-id').textContent = orders[0].id;
        }
    </script>
</body>
</html>
