<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ManSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding-top: 120px;
            margin-bottom: 80px;
        }

        .product-images {
            position: sticky;
            top: 120px;
        }

        .main-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .product-info-pane {
            padding: 20px 0;
        }

        .breadcrumb {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-title {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .product-price-large {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .product-description {
            color: #475569;
            line-height: 1.8;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .options-group {
            margin-bottom: 30px;
        }

        .options-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .size-chips {
            display: flex;
            gap: 12px;
        }

        .size-chip {
            width: 50px;
            height: 50px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .size-chip:hover, .size-chip.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }

        .buy-actions {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .qty-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 18px;
        }

        .qty-btn:hover { background: #f8fafc; }
        .qty-input {
            width: 50px;
            height: 44px;
            border: none;
            border-left: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            text-align: center;
            outline: none;
        }

        @media (max-width: 768px) {
            .product-detail-container { grid-template-columns: 1fr; gap: 30px; }
            .product-images { position: static; }
        }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled">
        <nav class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/logo.svg" alt="ManSeek" height="40">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="custom.html">Custom Design</a></li>
            </ul>
            <div class="nav-icons">
                <button id="cart-btn" class="cart-trigger">
                    <i class="icon-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
                <button id="user-btn" title="My Account"><i class="icon-user"></i></button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div id="product-content" class="product-detail-container">
            <!-- Content will be injected by JS -->
            <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
                <h2 class="playfair">Loading Product...</h2>
            </div>
        </div>
    </main>

    <div class="cart-drawer-overlay"></div>
    <div class="cart-drawer"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const productId = parseInt(params.get('id'));
            
            const product = products.find(p => p.id === productId);
            const content = document.getElementById('product-content');

            if (!product) {
                content.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px;">
                        <h2 class="playfair">Product Not Found</h2>
                        <a href="shop.html" class="btn btn-primary" style="margin-top: 20px; display: inline-block;">Back to Shop</a>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <div class="product-images">
                    <img src="${product.image}" alt="${product.name}" class="main-img">
                </div>
                <div class="product-info-pane">
                    <div class="breadcrumb">Shop / Hoodies / ${product.name}</div>
                    <h1 class="playfair product-title">${product.name}</h1>
                    <div class="product-price-large">₹${product.price.toLocaleString('en-IN')}</div>
                    
                    <p class="product-description">
                        Experience the ultimate blend of comfort and street style. This premium hoodie is crafted from 100% heavyweight cotton, featuring a double-lined hood and reinforced stitching for lasting durability. Perfect for expressing your unique spirit.
                    </p>

                    <div class="options-group">
                        <label>Select Size</label>
                        <div class="size-chips">
                            <div class="size-chip">S</div>
                            <div class="size-chip active">M</div>
                            <div class="size-chip">L</div>
                            <div class="size-chip">XL</div>
                        </div>
                    </div>

                    <div class="buy-actions">
                        <div class="quantity-selector">
                            <button class="qty-btn" onclick="updateQty(-1)">-</button>
                            <input type="number" value="1" id="qty-input" class="qty-input" readonly>
                            <button class="qty-btn" onclick="updateQty(1)">+</button>
                        </div>
                        <button class="btn btn-primary btn-block" onclick="addToCart('${product.id}')">Add to Bag</button>
                    </div>

                    <div style="margin-top: 40px; border-top: 1px solid #f1f5f9; padding-top: 30px;">
                        <div style="display: flex; gap: 15px; margin-bottom: 15px; font-size: 14px;">
                            <span style="color: #10b981;">✓</span> Free shipping on orders over ₹1,999
                        </div>
                        <div style="display: flex; gap: 15px; font-size: 14px;">
                            <span style="color: #10b981;">✓</span> 15-day easy returns
                        </div>
                    </div>
                </div>
            `;

            // Size selection logic
            document.querySelectorAll('.size-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                });
            });
        });

        function updateQty(delta) {
            const input = document.getElementById('qty-input');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            input.value = val;
        }
    </script>
</body>
</html>
