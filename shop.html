<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | ManSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            padding-top: 120px;
            margin-bottom: 80px;
        }

        .filters-pane {
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .filter-group {
            margin-bottom: 30px;
        }

        .filter-group h4 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .filter-item input {
            cursor: pointer;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .sort-select {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: white;
            outline: none;
        }

        @media (max-width: 768px) {
            .shop-container { grid-template-columns: 1fr; }
            .filters-pane { display: none; }
        }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled">
        <nav class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/logo.svg" alt="ManSeek" height="40">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="custom.html">Custom Design</a></li>
            </ul>
            <div class="nav-icons">
                <button id="cart-btn" class="cart-trigger">
                    <i class="icon-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
                <button id="user-btn" title="My Account"><i class="icon-user"></i></button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="shop-container">
            <aside class="filters-pane">
                <div class="filter-group">
                    <h4>Categories</h4>
                    <div class="filter-list">
                        <label class="filter-item"><input type="checkbox" checked> All Hoodies</label>
                        <label class="filter-item"><input type="checkbox"> Sleeveless</label>
                        <label class="filter-item"><input type="checkbox"> Oversized</label>
                        <label class="filter-item"><input type="checkbox"> Custom</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Size</h4>
                    <div class="filter-list" style="flex-direction: row; flex-wrap: wrap;">
                        <button class="btn btn-outline" style="padding: 8px 12px; font-size: 12px;">S</button>
                        <button class="btn btn-outline" style="padding: 8px 12px; font-size: 12px;">M</button>
                        <button class="btn btn-outline" style="padding: 8px 12px; font-size: 12px;">L</button>
                        <button class="btn btn-outline" style="padding: 8px 12px; font-size: 12px;">XL</button>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Price Range</h4>
                    <input type="range" min="1000" max="5000" style="width: 100%;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px;">
                        <span>₹1,000</span>
                        <span>₹5,000</span>
                    </div>
                </div>
            </aside>

            <section class="shop-content">
                <div class="shop-header">
                    <h2 class="playfair">All Products</h2>
                    <select class="sort-select">
                        <option>Newest First</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                    </select>
                </div>

                <div class="product-grid" id="shop-products">
                    <!-- Products will be injected by JS -->
                </div>
            </section>
        </div>
    </main>

    <div class="cart-drawer-overlay"></div>
    <div class="cart-drawer"></div>

    <script src="js/app.js"></script>
    <script>
        // Override render for shop page
        function renderShopProducts() {
            const grid = document.getElementById('shop-products');
            if (!grid) return;
            
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <a href="product.html?id=${product.id}">
                            <img src="${product.image}" alt="${product.name}">
                        </a>
                        <div class="product-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); addToCart('${product.id}')">
                                <i class="icon-shopping-cart"></i>
                            </button>
                        </div>
                    </div>
                    <div class="product-info">
                        <a href="product.html?id=${product.id}" style="text-decoration: none; color: inherit;">
                            <h3>${product.name}</h3>
                        </a>
                        <div class="product-price">
                            <span class="old-price">₹${product.originalPrice}</span>
                            <span class="current-price">₹${product.price.toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        renderShopProducts();
    </script>
</body>
</html>
